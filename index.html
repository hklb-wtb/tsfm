<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Too Sexy For My</title>
  <meta name="description" content="A cinematic teaser page with Matrix-style digital rain and a centered title reveal." />
  <meta property="og:title" content="Too Sexy For My" />
  <meta property="og:description" content="Matrix-style code rain resolves into a centered title reveal." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --space-4: 1rem;
      --space-8: 2rem;
      --color-bg: #000000;
      --color-text: #e9ffee;
      --color-primary: #6cff9f;
      --font-display: 'Orbitron', Arial, sans-serif;
      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
    }

    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--color-bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@600;700;800&display=swap');

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    .veil {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.58), rgba(0,0,0,0.28) 22%, rgba(0,0,0,0.5)),
        radial-gradient(circle at center, rgba(108,255,159,0.08), transparent 34%),
        linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0.24));
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: var(--space-8);
    }

    .hero {
      width: min(100%, 54rem);
      text-align: center;
      display: grid;
      gap: var(--space-4);
      justify-items: center;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 1.5rem + 4vw, 5.5rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--color-text);
      text-shadow:
        0 0 10px rgba(108,255,159,0.25),
        0 0 30px rgba(108,255,159,0.18),
        0 0 60px rgba(108,255,159,0.08);
    }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.95rem;
      color: rgba(231,255,238,0.8);
      padding: 0.75rem 1rem;
      border-radius: 9999px;
      border: 1px solid rgba(108,255,159,0.14);
      background: rgba(4,12,8,0.62);
      backdrop-filter: blur(10px);
    }

    .pulse {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 9999px;
      background: var(--color-primary);
      box-shadow: 0 0 0 0 rgba(108,255,159,0.75);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(108,255,159,0.6); }
      70% { box-shadow: 0 0 0 16px rgba(108,255,159,0); }
      100% { box-shadow: 0 0 0 0 rgba(108,255,159,0); }
    }

    @media (max-width: 640px) {
      h1 { font-size: clamp(2.2rem, 1.2rem + 7vw, 3.8rem); }
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="veil" aria-hidden="true"></div>

  <main>
    <section class="hero" aria-labelledby="coming-soon-heading">
      <h1 id="coming-soon-heading">Too Sexy For My</h1>
      <div class="status-line" aria-label="Project status: coming soon">
        <span class="pulse" aria-hidden="true"></span>
        <span>Coming soon</span>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const baseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アカサタナハマヤラワヰヱΩΣЖΨ⟁⟟⌬⋄';
      const accentGlyphs = ['🪬', 'CAR', 'TRK', 'SUV', 'CAB'];
      const titleLines = ['Too Sexy For My....', 'is coming soon.'];

      let width = 0;
      let height = 0;
      let fontSize = 22;
      let columns = 0;
      let streams = [];
      let targetPoints = [];
      let phaseStart = performance.now();
      const cycleDuration = reducedMotion ? 18000 : 14000;

      const randomChar = () => {
        if (Math.random() < 0.055) return accentGlyphs[Math.floor(Math.random() * accentGlyphs.length)];
        return baseChars[Math.floor(Math.random() * baseChars.length)];
      };

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * DPR);
        canvas.height = Math.floor(height * DPR);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

        fontSize = width < 640 ? 16 : width < 960 ? 20 : 24;
        columns = Math.ceil(width / fontSize);
        streams = Array.from({ length: columns }, (_, i) => createStream(i));
        targetPoints = buildTextTargets();
      }

      function createStream(i) {
        return {
          x: i * fontSize,
          y: Math.random() * -height,
          speed: (reducedMotion ? 0.45 : 0.8) * fontSize * (0.45 + Math.random() * 0.85),
          length: 6 + Math.floor(Math.random() * 16),
          glyphs: Array.from({ length: 24 }, () => randomChar())
        };
      }

      function buildTextTargets() {
        const offscreen = document.createElement('canvas');
        offscreen.width = width;
        offscreen.height = height;
        const octx = offscreen.getContext('2d');
        octx.clearRect(0, 0, width, height);

        const size = Math.min(width * 0.1, height * 0.12, width < 640 ? 34 : 72);
        const lineGap = size * 1.15;
        octx.fillStyle = '#fff';
        octx.textAlign = 'center';
        octx.textBaseline = 'middle';
        octx.font = `800 ${size}px Orbitron, sans-serif`;

        const centerY = height * 0.48;
        titleLines.forEach((line, index) => {
          const y = centerY + (index - (titleLines.length - 1) / 2) * lineGap;
          octx.fillText(line, width / 2, y);
        });

        const image = octx.getImageData(0, 0, width, height).data;
        const points = [];
        const step = width < 640 ? 9 : 11;

        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const alpha = image[(y * width + x) * 4 + 3];
            if (alpha > 120) {
              points.push({
                x,
                y,
                glyph: Math.random() < 0.08 ? accentGlyphs[Math.floor(Math.random() * accentGlyphs.length)] : randomChar(),
                jitter: Math.random() * Math.PI * 2
              });
            }
          }
        }
        return points;
      }

      function drawStreams() {
        ctx.fillStyle = 'rgba(2, 4, 3, 0.14)';
        ctx.fillRect(0, 0, width, height);
        ctx.font = `${fontSize}px monospace`;
        ctx.textBaseline = 'top';

        for (const stream of streams) {
          for (let i = 0; i < stream.length; i++) {
            const glyph = stream.glyphs[(Math.floor(stream.y / fontSize) + i) % stream.glyphs.length];
            const y = stream.y - i * fontSize;
            if (y < -fontSize || y > height + fontSize) continue;

            const alpha = 1 - i / (stream.length + 1);
            const isLead = i === 0;
            ctx.fillStyle = isLead
              ? `rgba(220, 255, 230, ${0.92})`
              : `rgba(108, 255, 159, ${0.18 + alpha * 0.55})`;

            if (glyph.length > 1) {
              ctx.font = `${Math.max(11, fontSize * 0.52)}px Inter, sans-serif`;
              ctx.fillText(glyph, stream.x - fontSize * 0.18, y);
              ctx.font = `${fontSize}px monospace`;
            } else {
              ctx.fillText(glyph, stream.x, y);
            }
          }

          stream.y += stream.speed;
          if (Math.random() < 0.055) {
            stream.glyphs[Math.floor(Math.random() * stream.glyphs.length)] = randomChar();
          }
          if (stream.y - stream.length * fontSize > height + Math.random() * 240) {
            Object.assign(stream, createStream(Math.round(stream.x / fontSize)));
          }
        }
      }

      function drawResolvedText(progress) {
        if (!targetPoints.length) return;
        const eased = progress < 0.5
          ? 4 * progress * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 3) / 2;

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (let i = 0; i < targetPoints.length; i++) {
          const point = targetPoints[i];
          const startX = (i * 37) % width;
          const startY = -40 - ((i * 23) % Math.max(height, 1));
          const drift = Math.sin(progress * 8 + point.jitter) * (1 - eased) * 18;
          const x = startX + (point.x - startX) * eased + drift;
          const y = startY + (point.y - startY) * eased;
          const glow = 0.28 + 0.72 * eased;

          if (point.glyph.length > 1) {
            ctx.font = `${Math.max(10, fontSize * 0.48)}px Inter, sans-serif`;
          } else {
            ctx.font = `${Math.max(14, fontSize * 0.9)}px monospace`;
          }

          ctx.fillStyle = `rgba(108,255,159,${glow})`;
          ctx.fillText(point.glyph, x, y);
        }

        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
      }

      function render(now) {
        drawStreams();

        const elapsed = (now - phaseStart) % cycleDuration;
        const progress = reducedMotion
          ? Math.min(1, elapsed / (cycleDuration * 0.45))
          : elapsed < cycleDuration * 0.28
            ? 0
            : elapsed < cycleDuration * 0.62
              ? (elapsed - cycleDuration * 0.28) / (cycleDuration * 0.34)
              : 1;

        drawResolvedText(progress);
        requestAnimationFrame(render);
      }

      resize();
      window.addEventListener('resize', resize, { passive: true });
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
