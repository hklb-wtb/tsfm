<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Too Sexy For My</title>
  <meta name="description" content="A cinematic teaser page with Matrix-style digital rain and a centered title reveal." />
  <meta property="og:title" content="Too Sexy For My" />
  <meta property="og:description" content="Matrix-style code rain resolves into a centered title reveal." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --space-4: 1rem;
      --space-8: 2rem;
      --color-bg: #000000;
      --color-text: #e9ffee;
      --color-primary: #6cff9f;
      --font-display: 'Orbitron', Arial, sans-serif;
      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
    }

    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--color-bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@600;700;800&display=swap');

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #000;
    }

    .veil {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.58), rgba(0,0,0,0.28) 22%, rgba(0,0,0,0.5)),
        radial-gradient(circle at center, rgba(108,255,159,0.08), transparent 34%),
        linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0.24));
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: var(--space-8);
    }

    .hero {
      width: min(100%, 54rem);
      text-align: center;
      display: grid;
      gap: var(--space-4);
      justify-items: center;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 1.5rem + 4vw, 5.5rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--color-text);
      text-shadow:
        0 0 10px rgba(108,255,159,0.25),
        0 0 30px rgba(108,255,159,0.18),
        0 0 60px rgba(108,255,159,0.08);
    }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.95rem;
      color: rgba(231,255,238,0.8);
      padding: 0.75rem 1rem;
      border-radius: 9999px;
      border: 1px solid rgba(108,255,159,0.14);
      background: rgba(4,12,8,0.62);
      backdrop-filter: blur(10px);
    }

    .pulse {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 9999px;
      background: var(--color-primary);
      box-shadow: 0 0 0 0 rgba(108,255,159,0.75);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(108,255,159,0.6); }
      70% { box-shadow: 0 0 0 16px rgba(108,255,159,0); }
      100% { box-shadow: 0 0 0 0 rgba(108,255,159,0); }
    }

    @media (max-width: 640px) {
      h1 { font-size: clamp(2.2rem, 1.2rem + 7vw, 3.8rem); }
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="veil" aria-hidden="true"></div>

  <main>
    <section class="hero" aria-labelledby="coming-soon-heading">
      <h1 id="coming-soon-heading">Too Sexy For My</h1>
      <div class="status-line" aria-label="Project status: coming soon">
        <span class="pulse" aria-hidden="true"></span>
        <span>Coming soon</span>
      </div>
    </section>
  </main>
