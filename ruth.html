<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruth</title>
  <meta name="description" content="PIN-gated letter page for Ruth." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --bg: #000;
      --green: #86ff9f;
      --green-soft: rgba(134, 255, 159, 0.72);
      --green-dim: rgba(134, 255, 159, 0.18);
      --panel: rgba(6, 20, 10, 0.72);
      --font: 'Inter', 'Helvetica Neue', sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--green); font-family: var(--font); }
    body { min-height: 100dvh; display: grid; place-items: center; overflow: hidden; }
    .screen { width: min(92vw, 420px); }
    .panel {
      border: 1px solid var(--green-dim);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 0 40px rgba(0,0,0,.45), 0 0 20px rgba(134,255,159,.08);
      backdrop-filter: blur(10px);
      padding: 24px;
      transition: box-shadow .22s ease, transform .22s ease, opacity .22s ease;
    }
    .panel.shake { animation: shake 0.35s ease-in-out; box-shadow: 0 0 34px rgba(255,90,90,.18), 0 0 20px rgba(134,255,159,.08); }
    .panel.unlock { animation: glow 0.9s ease-out; }
    .label { letter-spacing: .22em; text-transform: uppercase; font-size: .72rem; color: var(--green-soft); margin-bottom: 14px; }
    .pin-display {
      height: 56px;
      border-radius: 14px;
      border: 1px solid var(--green-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: .45em;
      font-size: 1.25rem;
      color: var(--green);
      margin-bottom: 18px;
      background: rgba(0,0,0,.3);
      text-shadow: 0 0 10px rgba(134,255,159,.25);
    }
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    button {
      appearance: none;
      border: 1px solid var(--green-dim);
      background: rgba(0,0,0,.34);
      color: var(--green);
      border-radius: 14px;
      height: 58px;
      font: inherit;
      font-size: 1.15rem;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    button:hover { transform: translateY(-1px); border-color: rgba(134,255,159,.38); background: rgba(134,255,159,.08); box-shadow: 0 0 18px rgba(134,255,159,.08); }
    button:focus-visible { outline: 2px solid var(--green); outline-offset: 3px; }
    .wide { grid-column: span 2; }
    .status { min-height: 1.4em; margin-top: 14px; text-align: center; color: var(--green-soft); font-size: .95rem; }
    .letter {
      display: none;
      width: min(92vw, 720px);
      border: 1px solid var(--green-dim);
      border-radius: 20px;
      background: rgba(4, 16, 8, 0.64);
      padding: clamp(24px, 5vw, 56px);
      box-shadow: 0 0 40px rgba(0,0,0,.45);
      line-height: 1.8;
      font-size: clamp(1rem, 0.96rem + .2vw, 1.12rem);
      white-space: pre-wrap;
    }
    .letter.glow { animation: letterGlow 1.1s ease-out; }
    .date { margin-bottom: 28px; color: var(--green-soft); letter-spacing: .08em; }
    .hidden { display: none; }
    .audio-note { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); color: var(--green-soft); font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; opacity: .8; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    @keyframes glow {
      0% { box-shadow: 0 0 0 rgba(134,255,159,0); transform: scale(0.98); }
      40% { box-shadow: 0 0 42px rgba(134,255,159,.22); transform: scale(1.01); }
      100% { box-shadow: 0 0 40px rgba(0,0,0,.45); transform: scale(1); }
    }
    @keyframes letterGlow {
      0% { opacity: 0; transform: translateY(10px) scale(0.99); box-shadow: 0 0 0 rgba(134,255,159,0); }
      100% { opacity: 1; transform: translateY(0) scale(1); box-shadow: 0 0 40px rgba(0,0,0,.45); }
    }
  </style>
</head>
<body>
  <div class="screen" id="gate">
    <div class="panel" id="panel">
      <div class="label">Enter 4-digit pin</div>
      <div class="pin-display" id="pinDisplay" aria-live="polite"></div>
      <div class="keypad" aria-label="PIN keypad">
        <button type="button" data-digit="1">1</button>
        <button type="button" data-digit="2">2</button>
        <button type="button" data-digit="3">3</button>
        <button type="button" data-digit="4">4</button>
        <button type="button" data-digit="5">5</button>
        <button type="button" data-digit="6">6</button>
        <button type="button" data-digit="7">7</button>
        <button type="button" data-digit="8">8</button>
        <button type="button" data-digit="9">9</button>
        <button type="button" id="backBtn">⌫</button>
        <button type="button" data-digit="0">0</button>
        <button type="button" id="clearBtn">Clear</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <section class="letter hidden" id="letter">
    <div class="date">04/18/2026</div>
    Dear Ruth,
  </section>
  <div class="audio-note" id="audioNote" hidden>Unlocked</div>

  <script>
    (() => {
      const PIN = '0418';
      const digits = [];
      const pinDisplay = document.getElementById('pinDisplay');
      const status = document.getElementById('status');
      const gate = document.getElementById('gate');
      const panel = document.getElementById('panel');
      const letter = document.getElementById('letter');
      const audioNote = document.getElementById('audioNote');
      const update = () => pinDisplay.textContent = digits.map(() => '•').join('');
      let audioCtx;
      const playUnlockSound = async () => {
        try {
          audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') await audioCtx.resume();
          const t = audioCtx.currentTime;
          const notes = [523.25, 659.25, 783.99];
          notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = i === 2 ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(freq, t + i * 0.11);
            gain.gain.setValueAtTime(0.0001, t + i * 0.11);
            gain.gain.exponentialRampToValueAtTime(0.09, t + i * 0.11 + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.11 + 0.18);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(t + i * 0.11);
            osc.stop(t + i * 0.11 + 0.22);
          });
        } catch (e) {}
      };
      const shake = () => { panel.classList.remove('shake'); void panel.offsetWidth; panel.classList.add('shake'); };
      const unlock = () => {
        gate.style.display = 'none';
        letter.classList.remove('hidden');
        letter.classList.add('glow');
        letter.style.display = 'block';
        audioNote.hidden = false;
        playUnlockSound();
      };

      document.querySelectorAll('[data-digit]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (digits.length >= 4) return;
          digits.push(btn.dataset.digit);
          update();
          status.textContent = '';
          if (digits.length === 4) check();
        });
      });

      document.getElementById('backBtn').addEventListener('click', () => {
        digits.pop();
        update();
        status.textContent = '';
      });

      document.getElementById('clearBtn').addEventListener('click', () => {
        digits.length = 0;
        update();
        status.textContent = '';
      });

      function check() {
        if (digits.join('') === PIN) {
          panel.classList.add('unlock');
          setTimeout(unlock, 420);
        } else {
          status.textContent = 'Incorrect PIN';
          digits.length = 0;
          update();
          shake();
        }
      }

      update();
    })();
  </script>
</body>
</html>
